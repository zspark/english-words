<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jerry's English Words</title>
    <link rel="stylesheet" href="www/word-edit.css">
</head>

<body>
    <div class="card float-card">
        <div class="card-header">
            <h3>Add New Word</h3>
            <button id="btn-close-card" title="Close"
                style="background:none; border:none; cursor:pointer; font-size:1.2rem; color:#94a3b8;">&times;</button>
        </div>

        <form id="new-word-form" class="word-form">
            <!-- 单词拼写 -->
            <div class="form-group">
                <label for="new-vocab">Vocabulary</label>
                <input type="text" id="new-vocab" placeholder="e.g. minimalist" required autocomplete="off">
            </div>

            <!-- 音标 & 等级 并排布局（节约空间） -->
            <div class="form-row">
                <div class="form-group flex-2">
                    <label for="new-ipa">Phonetic (IPA)</label>
                    <input type="text" id="new-ipa" placeholder="e.g. /'mɪnɪməlɪst/" autocomplete="off">
                </div>
                <div class="form-group flex-1">
                    <label for="new-level">Level</label>
                    <select id="new-level">
                        <option value="">None</option>
                        <option value="A1">A1</option>
                        <option value="A2">A2</option>
                        <option value="B1">B1</option>
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                        <option value="C2">C2</option>
                    </select>
                </div>
            </div>

            <!-- 中文释义 -->
            <div class="form-group">
                <label for="new-meaning">Meaning</label>
                <input type="text" id="new-meaning" placeholder="e.g. 极简主义的" required autocomplete="off">
            </div>

            <!-- 例句 -->
            <div class="form-group">
                <label for="new-example">Example Sentence</label>
                <textarea id="new-example" placeholder="e.g. He lives a minimalist lifestyle." rows="2"></textarea>
            </div>

            <!-- 关联词 -->
            <div class="form-group">
                <label for="new-links">Linked Words (Comma separated)</label>
                <input type="text" id="new-links" placeholder="e.g. minimal, simplify" autocomplete="off">
            </div>

            <!-- 提交与重置按钮 -->
            <div class="form-actions">
                <button type="button" id="btn-reset-form" class="btn-secondary">Reset</button>
                <button type="submit" class="btn-primary">Add Word</button>
            </div>
        </form>
    </div>
</body>

</html>
