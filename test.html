<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dictionary Cache</title>

    <link rel="stylesheet" href="www/test.css">
</head>

<body>

    <div class="container">

        <h1>Dictionary Cache</h1>

        <input id="wordInput" placeholder="Input a word..." autocomplete="off">

        <div id="card"></div>

        <div class="toolbar">

            <button id="exportBtn">
                Export Cache
            </button>

            <button id="importBtn">
                Import Cache
            </button>

            <input type="file" id="fileInput" accept=".json" hidden>

        </div>

        <h2>Cached Words</h2>

        <div id="list"></div>

    </div>

    <script src="www/test.js"></script>

</body>

</html>
