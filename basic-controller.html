<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Basic Components</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            background: #f2f4f7;
            padding: 40px;
        }
    </style>

    <link rel="stylesheet" href="www/component.css">
</head>


<body>
    <div class="bs-panel" id="id-panel"> </div>

    <script src="www/components.js"> </script>

    <script>
        const cmp = initComponents();

        const panel = document.getElementById("id-panel");
        panel.innerHTML = `${cmp.checkboxSource("xx", "Checkbox", ['Apple', 'Orange', 'Banan'], [1, 2])}
        ${cmp.radioButtonSource("xx", "Radio Button", ['Easy', 'Hard'], 1)}
        ${cmp.dropdownSource("xx", "Dropdown List", ['Beginner', 'Intermediate', 'Advanced'], 1)}
        ${cmp.sliderSource("xx", "Slider", 0, 100, 55)}
        ${cmp.inputSource("xx", "Input", "Enter a word")}
        ${cmp.buttonGroupSource("xx", ["btnA",'btnB','btnC'])}
        ${cmp.progressBarSource("xx", 66)}
        ${cmp.textareaSource("xx", "TextArea")}
        ${cmp.switcherSource("xx", "Switcher")}`;

        const slider = document.getElementById("bsSlider");
        const sliderValue = document.getElementById("bsSliderValue");
        slider.addEventListener(
            "input",
            () => {

                sliderValue.textContent =
                    slider.value;

            }
        );
    </script>
</body>

</html>
